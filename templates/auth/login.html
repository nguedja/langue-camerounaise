

{% extends "basse.html" %}
{% block content %}

<style>

/* FOND NOIR */
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #000 !important;
}

/* Carte formulaire AGRANDIE */
.auth-container {
    background: white;
    padding: 60px;
    border-radius: 20px;
    width: 80%;          /* prend 70% de l'écran */
     min-height: 70vh;
    max-width: 1000px;    /* limite raisonnable sur grand écran */
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

/* Titre */
.auth-container h2 {
    margin-bottom: 20px;
    font-size: 2rem;
    color: #fff;
}

/* Inputs */
.form-auth input {
    width: 100%;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 1.1rem;
}

/* Bouton */
.btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: #333;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    margin-top: 15px;
}

.btn:hover {
    background: black;
}

/* Liens */
.auth-container a {
    color: #ccc;
    font-weight: bold;
    text-decoration: none;
}

.auth-container a:hover {
    text-decoration: underline;
    color: #fff;
}

/* Responsive mobile */
@media (max-width: 768px) {
    .auth-container {
        width: 90%;
        padding: 30px;
    }

    .auth-container h2 {
        font-size: 1.5rem;
    }
}

</style>

<div class="auth-container">
    <h2>🇨🇲🇨🇲</h2>
    <h2>🔐 Paramètre de Connexion</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post" class="form-auth">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Mot de passe" required>

        <button class="btn">Se connecter</button>
    </form>

    <p>Pas encore de compte ? <a href="/register">Créer un compte</a></p>

    <p style="margin-top:15px;">
        Êtes-vous admin ? 
        <a href="/admin-password">Connexion administrateur</a>
    </p>

</div>

{% endblock %}
